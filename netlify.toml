[build]
  command = "npm run build"
  functions = "netlify"
  
[functions]
  "*" = { timeout = 20 }

[[headers]]
  for = "/health"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Content-Type = "text/plain"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/markdown; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/markdown; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/health"
  to = "/200.html"
  status = 200
  force = true

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
  Cache-Control = '''
      public,
      max-age=0'''
  Content-Type = "application/json"
  X-Content-Type-Options = "nosniff"

[[headers]]
for = "/.well-known/apple-app-site-association"
[headers.values]
Content-Type = "application/json"
Cache-Control = "public, max-age=0"
X-Content-Type-Options = "nosniff"


[[headers]]
  for = "/.well-known/nostr.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"
    Access-Control-Allow-Headers = "Content-Type"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'none';"
    X-Frame-Options = "DENY"
    # Pin HTTPS so a first-hit downgrade / SSL-strip can't reach a wallet page.
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"


# Main redirection for user profiles
[[redirects]]
  from = "/u/:username/"
  to = "/.netlify/functions/dynamic-profile"
  status = 200

[[redirects]]
  from = "/u/:username"
  to = "/.netlify/functions/dynamic-profile"
  status = 200

[[redirects]]
  from = "/gift/:giftInfo/"
  to = "/.netlify/functions/handle-gift"
  status = 200

[[redirects]]
  from = "/gift/:giftInfo"
  to = "/.netlify/functions/handle-gift"
  status = 200

# Child account invite landing page (static)
[[redirects]]
  from = "/child/*"
  to = "/pages/child/child.html"
  status = 200

# Favicon redirects
[[redirects]]
  from = "/favicon.ico"
  to = "/public/favicon/favicon.ico"
  status = 200
  
[[redirects]]
  from = "/favicon.svg"
  to = "/public/favicon/favicon.svg"
  status = 200
  
[[redirects]]
  from = "/favicon-96x96.png"
  to = "/public/favicon/favicon-96x96.png"
  status = 200
  
[[redirects]]
  from = "/apple-touch-icon.png"
  to = "/public/favicon/favicon.ico"
  status = 200
  
[[redirects]]
  from = "/site.webmanifest"
  to = "/public/favicon/site.webmanifest"
  status = 200

# Handle static assets
[[redirects]]
  from = "/public/*"
  to = "/public/:splat"
  status = 200
  
[[redirects]]
  from = "/src/*"
  to = "/src/:splat"
  status = 200
  
[[redirects]]
  from = "/u/index.js"
  to = "/u/index.js"
  status = 200
  
[[redirects]]
  from = "/u/index.css"
  to = "/u/index.css"
  status = 200

# LNURL redirects
[[redirects]]
  from = "/.well-known/lnurlp/:username"
  to = "https://proxy.blitz-wallet.com/.well-known/lnurlp/:username"
  status = 200
  force = true

  [redirects.rate_limit]
    window_limit = 20
    window_size = 60
    aggregate_by = ["ip", "domain"]

[[redirects]]
  from = "/p/:username"
  to = "https://proxy.blitz-wallet.com/p/:username"
  status = 200
  force = true

  [redirects.rate_limit]
    window_limit = 20
    window_size = 60
    aggregate_by = ["ip", "domain"]

[[redirects]]
  from = "/.well-known/lnurlverify/:sparkIDCode"
  to = "https://proxy.blitz-wallet.com/.well-known/lnurlverify/:sparkIDCode"
  status = 200
  force = true

  [redirects.rate_limit]
    window_limit = 100
    window_size = 60
    aggregate_by = ["ip", "domain"]

[[redirects]]
  from = "/getInvoice"
  to = "https://proxy.blitz-wallet.com/getInvoice"
  status = 200
  force = true
  headers = {X-From = "Netlify"}
  signed = "API_SIGNATURE_TOKEN"


<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      href="/public/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/public/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/public/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/public/favicon/apple-touch-icon.png"
    />
    <meta name="robots" content="index,nofollow" />
    <meta name="googlebot" content="noindex,nofollow" />
    <meta name="apple-mobile-web-app-title" content="Blitz Wallet" />
    <link rel="manifest" href="/public/favicon/site.webmanifest" />
    <link rel="stylesheet" href="/src/assets/styles/index.css" />
    <link rel="stylesheet" href="/pages/404/stye.css" />
    <link rel="stylesheet" href="/src/assets/styles/components.css" />
    <link rel="stylesheet" href="/src/assets/styles/navbar_footer.css" />
    <script src="/src/js/navbar.js" defer></script>
    <script src="/src/js/font-loader.js" defer></script>
    <title>Page Not Found</title>
  </head>
  <body>
    <nav>
      <div class="nav-container">
        <a href="/" class="logo"
          ><img src="/favicon.png" alt="Blitz Wallet logo"
        /></a>
        <ul class="nav-links">
          <li><a href="/#products">Products</a></li>
          <li><a href="/#features">Features</a></li>
          <li><a href="/pages/about">About</a></li>
          <li><a href="/pages/contact/">Contact</a></li>
          <li>
            <a href="/" class="nav-download-btn">Download</a>
          </li>
        </ul>
        <div class="mobile-menu" id="mobileMenu">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </nav>

    <main class="notfound">
      <svg
        viewBox="0 0 620 300"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
        aria-label="404"
      >
        <defs>
          <filter id="crayon" x="-6%" y="-6%" width="112%" height="112%">
            <feTurbulence
              type="fractalNoise"
              baseFrequency="0.022 0.038"
              numOctaves="2"
              seed="12"
              result="noise"
            />
            <feDisplacementMap
              in="SourceGraphic"
              in2="noise"
              scale="8"
              xChannelSelector="R"
              yChannelSelector="G"
            />
          </filter>
        </defs>
        <text
          x="50%"
          y="50%"
          dy="0.34em"
          text-anchor="middle"
          font-size="240"
          filter="url(#crayon)"
        >
          404
        </text>
      </svg>

      <h1>Page not found</h1>

      <a href="/" class="btn-primary">Back to home</a>
    </main>
  </body>
</html>
